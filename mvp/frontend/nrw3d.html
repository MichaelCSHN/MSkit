<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>MSkit · NRW 3D 实景无人机预览</title>
    <style>
      * { box-sizing: border-box; }
      html, body, #root { margin: 0; height: 100%; width: 100%; background: #0b1220; overflow: hidden; }
      body { font-family: system-ui, "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
      .hud {
        position: fixed; top: 12px; left: 12px; z-index: 10; width: 320px;
        background: rgba(11, 18, 32, 0.86); color: #e5e7eb; border-radius: 10px;
        padding: 12px 14px; box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
      }
      .hud .title { font-size: 14px; font-weight: 600; }
      .hud .title span { display: block; font-weight: 400; font-size: 11px; color: #93c5fd; margin-top: 3px; }
      .hud .spots { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
      .hud .spots button {
        padding: 6px 9px; border: 1px solid #334155; background: #111827; color: #e5e7eb;
        border-radius: 7px; cursor: pointer; font-size: 12px;
      }
      .hud .spots button:hover { background: #1f2937; border-color: #3b82f6; }
      .hud .status { font-size: 11px; color: #9ca3af; border-top: 1px solid #1f2937; padding-top: 8px; }
      .hud .back { color: #93c5fd; font-size: 11px; text-decoration: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/nrw3d.jsx"></script>
  </body>
</html>
